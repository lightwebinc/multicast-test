---
# Inventory for the bitcoin-retransmission playbook (github.com/lightwebinc/bitcoin-retransmission).
# Invoke via:  cd ~/repo/bitcoin-retransmission/ansible &&
#              ansible-playbook -i ~/repo/bitcoin-multicast-test/ansible/retry-hosts.yml site.yml
#
# retry1..3 are the retry endpoints on the lax LXD lab.
# MISS escalation order: retry1 (T0/P128) → retry2 (T0/P64) → retry3 (T1/P128).
# Host-level vars (ingress_iface, egress_iface, mc_iface, mgmt_cidrs_*) override
# group_vars/all.yml in the bitcoin-retransmission role.

all:
  children:
    retry_endpoint_nodes:
      vars:
        # Lab: skip clone+build by pushing a pre-built binary from controller.
        # Build: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -buildvcs=false \
        #   -o /tmp/bitcoin-retry-endpoint .  (in ~/repo/bitcoin-retry-endpoint)
        retry_local_binary: "/tmp/bitcoin-retry-endpoint"
        ansible_user: ubuntu
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GSSAPIAuthentication=no'
        ingress_mode: ethernet
        shard_bits: 2
        mc_scope: site
        listen_port: 9001           # multicast frame ingress (matches proxy/listener)
        nack_port: 9300             # NACK listener (listeners dial this)
        egress_port: 9001           # retransmission multicast egress
        cache_backend: memory
        cache_ttl: "60s"
        # NOTE: any var that bitcoin-retransmission's playbook group_vars/all.yml
        # defines (rl_*, enable_firewall, manage_netplan, ...) MUST be set
        # host-level — playbook group_vars beats inventory group vars in
        # Ansible precedence. See per-host block below.

      hosts:
        retry1:
          ansible_host: 10.10.10.34
          mc_iface: enp6s0
          egress_iface: enp6s0
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          nack_addr: "fd20::24"       # explicit bind addr — avoids SLAAC source selection
          beacon_tier: 0
          beacon_preference: 128
          beacon_interval: "5s"      # fast beacon for lab discovery (group_vars/all: 60s)
          redis_addr: "10.10.10.40:6379"  # Redis dedup backend (memory frame cache, shared dedup)
          dedup_window: "60s"
          # Lab rate limits — loosened so the NACK-storm a single subtx-gen
          # run produces (≈10k NACKs/10s × 3 listeners × NACK_MAX_RETRIES) is
          # not throttled. Production deployments should keep role defaults.
          # Two-level RL: per-IP token bucket + per-LookupSeq sliding window.
          # rl_sender_rate is a no-op since BRC-124 uses LookupSeq (not SenderID) for rate limiting.
          rl_ip_rate: 100000
          rl_ip_burst: 100
          rl_sequence_max: 1000000
          rl_sequence_window: "10s"   # short window so back-to-back scenarios
                                      # don't contaminate each other's state
          # The lab provisions netplan via lab/06-netplan/retry1.yaml (static
          # fd20::24 on enp6s0). Don't let the role overwrite it.
          manage_netplan: false

        retry2:
          ansible_host: 10.10.10.35
          mc_iface: enp6s0
          egress_iface: enp6s0
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          nack_addr: "fd20::25"       # explicit bind addr — avoids SLAAC source selection
          beacon_tier: 0
          beacon_preference: 64
          beacon_interval: "5s"
          redis_addr: "10.10.10.40:6379"
          dedup_window: "60s"
          rl_ip_rate: 100000
          rl_ip_burst: 100
          rl_sequence_max: 1000000
          rl_sequence_window: "10s"
          manage_netplan: false

        retry3:
          ansible_host: 10.10.10.36
          mc_iface: enp6s0
          egress_iface: enp6s0
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          nack_addr: "fd20::26"       # explicit bind addr — avoids SLAAC source selection
          beacon_tier: 1
          beacon_preference: 128
          beacon_interval: "5s"
          redis_addr: "10.10.10.40:6379"
          dedup_window: "60s"
          rl_ip_rate: 100000
          rl_ip_burst: 100
          rl_sequence_max: 1000000
          rl_sequence_window: "10s"
          manage_netplan: false

    redis_nodes:
      vars:
        ansible_user: ubuntu
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GSSAPIAuthentication=no'
        redis_bind_addr: "10.10.10.40"
      hosts:
        redis:
          ansible_host: 10.10.10.40
