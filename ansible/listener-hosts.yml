---
# Inventory for the bitcoin-listener playbook (github.com/lightwebinc/bitcoin-listener).
# Invoke via:  cd ~/repo/bitcoin-listener/ansible &&
#              ansible-playbook -i ~/repo/bitcoin-multicast-test/ansible/listener-hosts.yml site.yml
#
# Pinned subtree IDs (reproducibility):
#   Generated with:
#     subtx-gen -subtrees 8 -subtree-seed 'multicast-lab-bsv' -print-subtrees
#   Listener 2 excludes index 2; Listener 3 includes only index 5.
#   To rotate, regenerate the pool and update the hex strings below.

all:
  children:
    listener_nodes:
      vars:
        # Lab: skip clone+build by pushing a pre-built binary from controller.
        # Build: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -buildvcs=false \
        #   -o /tmp/bitcoin-shard-listener .  (in ~/repo/bitcoin-shard-listener)
        listener_local_binary: "/tmp/bitcoin-shard-listener"
        ansible_user: ubuntu
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GSSAPIAuthentication=no'
        ingress_mode: ethernet
        shard_bits: 2
        mc_scope: site
        listen_port: 9001
        enable_firewall: true
        enable_bgp: false
        # NOTE: mgmt_cidrs_v4/v6 and num_workers are set per-host below.
        # They CANNOT be group-level here because bitcoin-listener's
        # group_vars/all.yml defines the same variables and group_vars/all
        # wins over inventory group vars in Ansible precedence.
        egress_addr: "127.0.0.1:9100"
        egress_proto: "udp"
        strip_header: false
        metrics_addr: ":9200"
        beacon_enabled: true
        beacon_port: 9300
        beacon_scope: site
        # NOTE: retry_endpoints and nack_max_retries MUST be set per-host
        # (see precedence note above); bitcoin-listener's group_vars/all.yml
        # defines the same variables and group_vars/all wins over inventory
        # group vars in Ansible precedence.

      hosts:
        listener1:
          ansible_host: 10.10.10.31
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          retry_endpoints: "[fd20::24]:9300,[fd20::25]:9300,[fd20::26]:9300"
          nack_max_retries: 9
          # Defaults: listen to all shards, all subtrees.
          # Multicast egress: re-emit frames from ff05:: (site-local) to ff02:: (link-local).
          mc_egress_enabled: true
          mc_egress_scope: link

        listener2:
          ansible_host: 10.10.10.32
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          shard_include: "0,1"
          subtree_exclude: "336827e99b2caf22fcdda437828644c51cf39ff7a840a7cd16ae75310a34392a"
          retry_endpoints: "[fd20::24]:9300,[fd20::25]:9300,[fd20::26]:9300"
          nack_max_retries: 9

        listener3:
          ansible_host: 10.10.10.33
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          subtree_include: "4a3e3eedc730fc42c786f83e8244f54f54e833922d71cfb1b1cc5e53147c5ece"
          retry_endpoints: "[fd20::24]:9300,[fd20::25]:9300,[fd20::26]:9300"
          nack_max_retries: 9

        listener4:
          ansible_host: 10.10.10.37
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          # listener4 subscribes to the link-local (ff02::) egress domain from listener1.
          mc_scope: link
          # No shard/subtree filter — receive all re-emitted frames.
          # Beacon and NACK disabled: this node is a terminal consumer only.
          beacon_enabled: false
          retry_endpoints: ""
          nack_max_retries: 0
