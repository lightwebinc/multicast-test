---
# Inventory for the bitcoin-ingress playbook (github.com/lightwebinc/bitcoin-ingress).
# Invoke via:  cd ~/repo/bitcoin-ingress/ansible &&
#              ansible-playbook -i ~/repo/bitcoin-multicast-test/ansible/ingress-hosts.yml site.yml
#
# NOTE: egress_iface MUST be a host-level var, not group-level — group_vars/all
# in bitcoin-ingress would otherwise override it.

all:
  children:
    ingress_nodes:
      vars:
        # Lab: skip clone+build by pushing a pre-built binary from controller.
        # Build: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -buildvcs=false \
        #   -o /tmp/bitcoin-shard-proxy .  (in ~/repo/bitcoin-shard-proxy)
        proxy_local_binary: "/tmp/bitcoin-shard-proxy"
        ansible_user: ubuntu
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GSSAPIAuthentication=no'
        egress_mode: ethernet
        shard_bits: 2
        mc_scope: site
        enable_bgp: false

      hosts:
        proxy:
          ansible_host: 10.10.10.20
          egress_iface: enp6s0
          tcp_listen_port: 9002   # TCP ingress for BRC-127 SubtreeAnnounce forwarding
          # BGP peering with router2 (iBGP, AS 65001)
          enable_bgp: true
          bgp_daemon: bird2
          bgp_local_as: 65001
          bgp_peer_as: 65001
          bgp_peer_ip: "198.51.100.17"
          bgp_peer_ip6: "2001:db8:d::1"
          bgp_source_ip6: "2001:db8:d::2"
          bgp_router_id: "198.51.100.18"
          bgp_vip: "192.0.2.1"
          bgp_vip6: "2001:db8:ffff::1"
          bgp_prefix:
            - "192.0.2.0/24"
          bgp_prefix6:
            - "2001:db8:ffff::/48"

        proxy2:
          ansible_host: 10.10.10.21
          egress_iface: enp6s0
          tcp_listen_port: 9002
          # BGP peering with router2 (iBGP, AS 65001)
          enable_bgp: true
          bgp_daemon: bird2
          bgp_local_as: 65001
          bgp_peer_as: 65001
          bgp_peer_ip: "198.51.100.17"
          bgp_peer_ip6: "2001:db8:d::1"
          bgp_source_ip6: "2001:db8:d::3"
          bgp_router_id: "198.51.100.19"
          bgp_vip: "192.0.2.1"
          bgp_vip6: "2001:db8:ffff::1"
          bgp_prefix:
            - "192.0.2.0/24"
          bgp_prefix6:
            - "2001:db8:ffff::/48"
