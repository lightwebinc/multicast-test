# Canonical Prometheus scrape config for the multicast-lab.
# Pushed onto the `metrics` VM (10.10.10.142) by lab/09-metrics-update.sh.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: multicast-lab

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: shard-proxy
    metrics_path: /metrics
    static_configs:
      - targets: ['10.10.10.20:9100']
        labels:
          instance_role: proxy

  - job_name: shard-listener
    metrics_path: /metrics
    static_configs:
      - targets:
          - '10.10.10.31:9200'
          - '10.10.10.32:9200'
          - '10.10.10.33:9200'
          - '10.10.10.37:9200'
        labels:
          instance_role: listener
    relabel_configs:
      # Friendly `instance` label: listener1 / listener2 / listener3 / listener4.
      - source_labels: [__address__]
        regex: '10\.10\.10\.31:9200'
        target_label: instance
        replacement: 'listener1'
      - source_labels: [__address__]
        regex: '10\.10\.10\.32:9200'
        target_label: instance
        replacement: 'listener2'
      - source_labels: [__address__]
        regex: '10\.10\.10\.33:9200'
        target_label: instance
        replacement: 'listener3'
      - source_labels: [__address__]
        regex: '10\.10\.10\.37:9200'
        target_label: instance
        replacement: 'listener4'

  - job_name: retry-endpoint
    metrics_path: /metrics
    static_configs:
      - targets:
          - '10.10.10.34:9400'
          - '10.10.10.35:9400'
          - '10.10.10.36:9400'
        labels:
          instance_role: retry_endpoint
    relabel_configs:
      - source_labels: [__address__]
        regex: '10\.10\.10\.34:9400'
        target_label: instance
        replacement: 'retry1'
      - source_labels: [__address__]
        regex: '10\.10\.10\.35:9400'
        target_label: instance
        replacement: 'retry2'
      - source_labels: [__address__]
        regex: '10\.10\.10\.36:9400'
        target_label: instance
        replacement: 'retry3'
