---
# Combined inventory of all Ubuntu LXD lab VMs.
# Used by os-update.yml and other lab-wide maintenance playbooks.
#
# Usage:
#   ansible-playbook -i all-hosts.yml os-update.yml

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GSSAPIAuthentication=no'

  children:
    lab_nodes:
      hosts:
        source:
          ansible_host: 10.10.10.10
        proxy:
          ansible_host: 10.10.10.20
        proxy2:
          ansible_host: 10.10.10.21
        listener1:
          ansible_host: 10.10.10.31
        listener2:
          ansible_host: 10.10.10.32
        listener3:
          ansible_host: 10.10.10.33
        retry1:
          ansible_host: 10.10.10.34
        retry2:
          ansible_host: 10.10.10.35
        retry3:
          ansible_host: 10.10.10.36
        listener4:
          ansible_host: 10.10.10.37
        redis:
          ansible_host: 10.10.10.40
        metrics:
          ansible_host: 10.10.10.142
        router1:
          ansible_host: 10.10.10.51
        router2:
          ansible_host: 10.10.10.53
