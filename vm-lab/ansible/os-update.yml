---
# Full OS upgrade + conditional reboot for all lab VMs.
#
# Usage:
#   cd ~/repo/multicast-test/ansible
#   ansible-playbook -i all-hosts.yml os-update.yml
#
# Dry-run:
#   ansible-playbook -i all-hosts.yml os-update.yml --check --diff
#
# Limit to specific hosts:
#   ansible-playbook -i all-hosts.yml os-update.yml --limit "listener1,listener2"

- name: OS package upgrade and conditional reboot
  hosts: lab_nodes
  become: true
  gather_facts: true
  serial: 3
  tags: [os_update]

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Dist-upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      register: apt_result

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 300
        msg: "Rebooting after OS update"
      when: reboot_required.stat.exists

    - name: Wait for host to come back
      ansible.builtin.wait_for_connection:
        timeout: 120
      when: reboot_required.stat.exists
